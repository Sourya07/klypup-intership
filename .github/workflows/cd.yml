name: CD Pipeline

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    name: Build & Deploy Container Images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Example: Login to DockerHub / GitHub Container Registry
      # - name: Log in to Registry
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.REGISTRY_USER }}
      #     password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false # Set to true and specify tags to push to registry
          tags: ai-investment-api:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: false # Set to true and specify tags to push to registry
          tags: ai-investment-web:latest
